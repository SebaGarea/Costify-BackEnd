name: Keep backend warm

# Evita que el server en Render (plan free) se duerma por inactividad.
# Hace un ping al endpoint /health cada ~10 minutos.
#
# Requisito: definir la variable de repositorio BACKEND_URL
#   Settings -> Secrets and variables -> Actions -> Variables -> New repository variable
#   Nombre: BACKEND_URL   Valor: https://<tu-app>.onrender.com   (sin barra final)
#
# Nota: GitHub deshabilita los workflows programados tras 60 días sin actividad
# en el repo; un commit cualquiera los reactiva.

on:
  schedule:
    - cron: "*/10 * * * *" # cada 10 minutos
  workflow_dispatch: {} # permite ejecutarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          BASE="${{ vars.BACKEND_URL }}"
          if [ -z "$BASE" ]; then
            echo "BACKEND_URL no está definido. Configurá la variable de repositorio."
            exit 1
          fi
          echo "Pinging $BASE/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$BASE/health" || echo "000")
          echo "HTTP $code"
          # No fallar si el server está despertando (cold start); solo registrar.
          if [ "$code" = "200" ]; then
            echo "Backend despierto."
          else
            echo "Respuesta no-200 (puede estar despertando)."
          fi
